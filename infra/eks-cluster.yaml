apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: zahir-cluster
  region: us-east-1
  version: "1.30"

managedNodeGroups:
  - name: zahir-nodes
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    volumeSize: 20
    amiFamily: AmazonLinux2

addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
