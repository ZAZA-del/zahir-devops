apiVersion: apps/v1
kind: Deployment
metadata:
  name: zahir-frontend
  namespace: zahir
  labels:
    app: zahir-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zahir-frontend
  template:
    metadata:
      labels:
        app: zahir-frontend
    spec:
      containers:
        - name: zahir-frontend
          image: 143575007958.dkr.ecr.us-east-1.amazonaws.com/zahir-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: zahir-frontend-svc
  namespace: zahir
spec:
  selector:
    app: zahir-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
