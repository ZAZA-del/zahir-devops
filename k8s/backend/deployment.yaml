apiVersion: apps/v1
kind: Deployment
metadata:
  name: zahir-backend
  namespace: zahir
  labels:
    app: zahir-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zahir-backend
  template:
    metadata:
      labels:
        app: zahir-backend
    spec:
      containers:
        - name: zahir-backend
          image: 143575007958.dkr.ecr.us-east-1.amazonaws.com/zahir-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: zahir-backend-svc
  namespace: zahir
spec:
  selector:
    app: zahir-backend
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
