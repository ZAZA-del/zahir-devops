server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html — browser must always re-fetch to pick up new bundle filenames
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Hashed static assets can be cached aggressively
    location ~* \.(js|css|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy /api/ calls to the backend Spring Boot service (in-cluster DNS)
    location /api/ {
        proxy_pass http://zahir-backend-svc.zahir.svc.cluster.local/;
        proxy_http_version 1.1;
        proxy_set_header Host zahir-backend-svc;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check for Kubernetes probes
    location = /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # SPA fallback — only for HTML routes, NOT for missing assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/javascript;
}
